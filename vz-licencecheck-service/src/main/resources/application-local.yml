verifier-service:
  allowed-issuer-did: "MOCK-DID"
  client-name: "LicenceCheck (Local)"
  mock:
    failResponse: false
    errorCode: JWT_PREMATURE

spring:
  autoconfigure:
    exclude:
      # Exclude OAuth2 client autoconfiguration - local profile doesn't use OAuth2 for verifier-service
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration

jeap:
  logging:
    platform: local
  swagger:
    status: OPEN
  monitor:
    prometheus:
      user: "prometheus"
      password: "{noop}secret"

toTriggerPipeline:
    trigger: "true"

logging:
  level:
    ch.admin.astra.vz.lc: DEBUG

cors:
  allowed-origins:
    - 'http://localhost:8888'
    - 'http://localhost:4201'
    - 'http://127.0.0.1:8888'
    - 'http://127.0.0.1:4201'

springdoc:
  swagger-ui:
    enabled: true
